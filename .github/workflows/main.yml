name: Build PMMP PHP + Release (Debian 11)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: debian:11

    steps:
      - name: Setup timezone
        run: |
          export DEBIAN_FRONTEND=noninteractive
          ln -fs /usr/share/zoneinfo/Europe/Warsaw /etc/localtime
          echo "Europe/Warsaw" > /etc/timezone

      - name: Update system
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get -y dist-upgrade

      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get install -y \
          git curl wget \
          build-essential autoconf automake libtool libtool-bin pkg-config \
          cmake make gcc g++ \
          bison re2c \
          libsqlite3-dev libssl-dev zlib1g-dev \
          libxml2-dev libcurl4-openssl-dev \
          zip

      - name: Clone PHP-Binaries
        run: git clone https://github.com/pmmp/PHP-Binaries.git

      - name: Build PHP
        run: |
          cd PHP-Binaries
          chmod +x compile.sh
          ./compile.sh -P5 -j$(nproc)

      - name: Package build
        run: |
          mkdir release
          cp -r PHP-Binaries/bin release/
          zip -r pmmp-php.zip release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: PMMP PHP Build ${{ github.run_number }}
          files: pmmp-php.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
